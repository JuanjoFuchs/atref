<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>atref</title>
    <style>
      :root {
        --text: #ededed;
        --dim: #8c8c92;
        --accent: #16a38a;
        /* translucent so the DWM acrylic frosts through */
        --panel: rgba(22, 22, 26, 0.25);
        --sel: rgba(255, 255, 255, 0.10);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      .panel {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .header {
        display: flex;
        align-items: center;
        padding: 14px 20px 0;
      }
      .brand { color: var(--accent); font-weight: 600; font-size: 15px; }
      .header .spacer { flex: 1; }
      .counter { color: var(--dim); font-size: 13px; }
      .close { color: var(--dim); font-size: 16px; margin-left: 14px; cursor: pointer; }
      .search { padding: 10px 20px 16px; }
      .search input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 24px;
        font-weight: 300;
      }
      .search input::placeholder { color: var(--dim); }
      .results { flex: 1; overflow-y: auto; padding: 0 10px 8px; }
      .results::-webkit-scrollbar { width: 8px; }
      .results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 15px;
      }
      .row.sel { background: var(--sel); }
      .row .name { color: var(--text); }
      .row .loc { color: var(--dim); font-size: 13px; }
      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 18px;
        padding: 10px 20px 14px;
        font-size: 12.5px;
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <span class="brand">atref</span>
        <span class="spacer"></span>
        <span class="counter">5 / 723</span>
        <span class="close">✕</span>
      </div>
      <div class="search">
        <input id="q" placeholder="Search files…" autofocus />
      </div>
      <div class="results" id="results"></div>
      <div class="footer">
        <span>↵ insert</span>
        <span>↑↓ navigate</span>
        <span>esc close</span>
      </div>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const q = document.getElementById("q");
      const resultsEl = document.getElementById("results");
      const counterEl = document.querySelector(".counter");
      const closeEl = document.querySelector(".close");
      let rows = [];
      let sel = 0;

      function render() {
        resultsEl.innerHTML = "";
        rows.forEach((r, i) => {
          const row = document.createElement("div");
          row.className = "row" + (i === sel ? " sel" : "");
          const name = document.createElement("span");
          name.className = "name";
          name.textContent = r.name;
          const loc = document.createElement("span");
          loc.className = "loc";
          loc.textContent = r.location;
          row.append(name, loc);
          row.addEventListener("mousemove", () => { if (sel !== i) { sel = i; render(); } });
          row.addEventListener("click", () => accept(i));
          resultsEl.appendChild(row);
        });
        const cur = resultsEl.children[sel];
        if (cur) cur.scrollIntoView({ block: "nearest" });
      }

      async function doSearch() {
        const out = await invoke("search_files", { query: q.value });
        rows = out.rows;
        sel = 0;
        counterEl.textContent = out.matches + " / " + out.total;
        render();
      }

      async function accept(i) {
        const r = rows[i];
        if (r) await invoke("accept", { abs: r.abs });
      }
      async function hide() {
        await invoke("hide");
      }

      q.addEventListener("input", doSearch);
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") { sel = Math.min(sel + 1, rows.length - 1); render(); e.preventDefault(); }
        else if (e.key === "ArrowUp") { sel = Math.max(sel - 1, 0); render(); e.preventDefault(); }
        else if (e.key === "Enter") { accept(sel); e.preventDefault(); }
        else if (e.key === "Escape") { hide(); e.preventDefault(); }
      });
      closeEl.addEventListener("click", hide);
      // Click outside / focus loss dismisses the picker.
      window.addEventListener("blur", hide);
      // On summon: clear the query, refocus the box, re-search.
      listen("summon", () => { q.value = ""; q.focus(); doSearch(); });

      q.focus();
      doSearch();
    </script>
  </body>
</html>
