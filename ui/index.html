<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>atref</title>
    <style>
      :root {
        --text: #ededed;
        --dim: #8c8c92;
        --accent: #16a38a;
        /* translucent so the DWM acrylic frosts through */
        --panel: rgba(22, 22, 26, 0.25);
        --sel: rgba(255, 255, 255, 0.10);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      .panel {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .header {
        display: flex;
        align-items: center;
        padding: 14px 20px 0;
      }
      .brand { color: var(--accent); font-weight: 600; font-size: 15px; }
      .header .spacer { flex: 1; }
      .counter { color: var(--dim); font-size: 13px; }
      .close { color: var(--dim); font-size: 16px; margin-left: 14px; cursor: pointer; }
      .search { padding: 10px 20px 16px; }
      .search input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 24px;
        font-weight: 300;
      }
      .search input::placeholder { color: var(--dim); }
      .results { flex: 1; overflow-y: auto; padding: 0 10px 8px; }
      .results::-webkit-scrollbar { width: 8px; }
      .results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 15px;
      }
      .row.sel { background: var(--sel); }
      .row .name { color: var(--text); flex-shrink: 0; }
      .row .loc {
        color: var(--dim);
        font-size: 13px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .row .hl { color: var(--accent); font-weight: 600; }
      /* Right-aligned metrics: size · lines · ~tokens (spec 010). */
      .row .meta {
        margin-left: auto;
        flex-shrink: 0;
        color: var(--dim);
        font-size: 12px;
        white-space: nowrap;
      }
      /* Image-result thumbnail at the row's right edge (spec 011). */
      .row .thumb {
        height: 28px;
        max-width: 48px;
        flex-shrink: 0;
        border-radius: 4px;
        object-fit: cover;
      }
      .footer {
        display: flex;
        justify-content: flex-end;
        gap: 18px;
        padding: 10px 20px 14px;
        font-size: 12.5px;
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <span class="brand">atref</span>
        <span class="spacer"></span>
        <span class="counter">5 / 723</span>
        <span class="close">✕</span>
      </div>
      <div class="search">
        <input id="q" placeholder="Search files…" autofocus />
      </div>
      <div class="results" id="results"></div>
      <div class="footer">
        <span>↵ insert</span>
        <span>↑↓ navigate</span>
        <span>esc close</span>
      </div>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const q = document.getElementById("q");
      const resultsEl = document.getElementById("results");
      const counterEl = document.querySelector(".counter");
      const closeEl = document.querySelector(".close");
      let rows = [];
      let sel = 0;

      // Lazy per-file enrichment (spec 010): size renders immediately from the
      // search payload; lines/~tokens are fetched for visible rows only, 150 ms
      // after input settles, and cached per summon (the backend cache holds the
      // mtime-keyed truth).
      const enrichCache = new Map();
      const pendingEnrich = new Set();
      let enrichTimer = null;
      let metaEls = [];
      let io = null;

      function fmtSize(n) {
        if (n < 1024) return n + " B";
        if (n < 1048576) return (n / 1024).toFixed(n < 10240 ? 1 : 0) + " KB";
        if (n < 1073741824) return (n / 1048576).toFixed(1) + " MB";
        return (n / 1073741824).toFixed(1) + " GB";
      }
      function fmtTokens(n) {
        if (n < 1000) return "~" + n + " tok";
        if (n < 1000000) return "~" + (n / 1000).toFixed(1) + "k tok";
        return "~" + (n / 1000000).toFixed(1) + "M tok";
      }
      function metaText(r) {
        const e = enrichCache.get(r.abs);
        let t = fmtSize(e ? e.size : r.size);
        if (e && e.lines != null) t += " · " + e.lines + " ln · " + fmtTokens(e.tokens);
        return t;
      }

      function scheduleEnrich() {
        clearTimeout(enrichTimer);
        enrichTimer = setTimeout(flushEnrich, 150);
      }
      function flushEnrich() {
        for (const abs of pendingEnrich) {
          invoke("enrich", { abs })
            .then((e) => { enrichCache.set(abs, e); applyMeta(abs); })
            .catch(() => {});
        }
        pendingEnrich.clear();
      }
      function thumbImg(src) {
        const img = document.createElement("img");
        img.className = "thumb";
        img.alt = "thumbnail";
        img.src = src;
        return img;
      }
      function applyMeta(abs) {
        const e = enrichCache.get(abs);
        rows.forEach((r, i) => {
          if (r.abs !== abs || !metaEls[i]) return;
          metaEls[i].textContent = metaText(r);
          const rowEl = metaEls[i].parentElement;
          if (e && e.thumb && rowEl && !rowEl.querySelector(".thumb")) {
            rowEl.append(thumbImg(e.thumb));
          }
        });
      }

      // A span of `text` with the chars at code-point positions `hl` wrapped in
      // accent-styled runs (spec 009). DOM-built — file names may contain HTML
      // metacharacters. Array.from iterates code points, matching the backend's
      // char indices.
      function hlSpan(text, cls, hl) {
        const span = document.createElement("span");
        span.className = cls;
        if (!hl || hl.length === 0) { span.textContent = text; return span; }
        // Highlight runs fragment the text in the accessibility tree; the
        // label keeps the whole string readable (screen readers, UIA tests).
        span.setAttribute("aria-label", text);
        const set = new Set(hl);
        let run = "", runHl = false;
        const flush = () => {
          if (!run) return;
          if (runHl) {
            const m = document.createElement("span");
            m.className = "hl";
            m.textContent = run;
            span.appendChild(m);
          } else {
            span.appendChild(document.createTextNode(run));
          }
          run = "";
        };
        Array.from(text).forEach((c, i) => {
          const h = set.has(i);
          if (h !== runHl) { flush(); runHl = h; }
          run += c;
        });
        flush();
        return span;
      }

      function render() {
        resultsEl.innerHTML = "";
        metaEls = [];
        if (io) io.disconnect();
        // Visible rows queue an enrichment request (handles scrolling too).
        io = new IntersectionObserver((entries) => {
          for (const en of entries) {
            if (!en.isIntersecting) continue;
            const abs = en.target.dataset.abs;
            if (abs && !enrichCache.has(abs)) pendingEnrich.add(abs);
          }
          if (pendingEnrich.size) scheduleEnrich();
        }, { root: resultsEl });
        rows.forEach((r, i) => {
          const row = document.createElement("div");
          row.className = "row" + (i === sel ? " sel" : "");
          row.dataset.abs = r.abs;
          const name = hlSpan(r.name, "name", r.name_hl);
          const loc = hlSpan(r.location, "loc", r.loc_hl);
          const meta = document.createElement("span");
          meta.className = "meta";
          meta.textContent = metaText(r);
          metaEls.push(meta);
          row.append(name, loc, meta);
          const cached = enrichCache.get(r.abs);
          if (cached && cached.thumb) row.append(thumbImg(cached.thumb));
          row.addEventListener("mousemove", () => { if (sel !== i) { sel = i; render(); } });
          row.addEventListener("click", () => accept(i));
          resultsEl.appendChild(row);
          io.observe(row);
        });
        const cur = resultsEl.children[sel];
        if (cur) cur.scrollIntoView({ block: "nearest" });
      }

      async function doSearch() {
        const out = await invoke("search_files", { query: q.value });
        rows = out.rows;
        sel = 0;
        counterEl.textContent = out.matches + " / " + out.total;
        render();
      }

      async function accept(i) {
        const r = rows[i];
        if (r) await invoke("accept", { abs: r.abs });
      }
      // Explicit dismissal (Esc / ✕) returns focus to the pre-summon app; a
      // blur means focus already went somewhere on purpose — stealing it back
      // would (among other rudeness) instantly close the tray menu.
      async function hide(restore) {
        await invoke("hide", { restore: restore === true });
      }

      q.addEventListener("input", doSearch);
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowDown") { sel = Math.min(sel + 1, rows.length - 1); render(); e.preventDefault(); }
        else if (e.key === "ArrowUp") { sel = Math.max(sel - 1, 0); render(); e.preventDefault(); }
        else if (e.key === "Enter") { accept(sel); e.preventDefault(); }
        else if (e.key === "Escape") { hide(true); e.preventDefault(); }
      });
      closeEl.addEventListener("click", () => hide(true));
      // Click outside / focus loss dismisses the picker — without restoring
      // focus (it already moved where the user wanted).
      window.addEventListener("blur", () => hide(false));
      // On summon: clear the query, refocus the box, re-search. The enrich
      // cache resets too — files may have changed since the last summon (the
      // backend cache revalidates by mtime).
      listen("summon", () => {
        enrichCache.clear();
        pendingEnrich.clear();
        q.value = "";
        q.focus();
        doSearch();
      });

      q.focus();
      doSearch();
    </script>
  </body>
</html>
